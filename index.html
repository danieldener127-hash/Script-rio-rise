<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOSTS_SCRIPTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root {
    --orange: #ff7b00;
    --amber: #ffaa00;
    --dark: #080c18;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e8ecf7;
    --muted: #6b7490;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,123,0,0.18) 0%, transparent 70%);
    top: -150px; left: 50%;
    transform: translateX(-50%);
    animation: pulse 6s ease-in-out infinite;
  }
  .bg::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,170,0,0.10) 0%, transparent 70%);
    bottom: 50px; right: -100px;
    animation: pulse 8s ease-in-out 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.6; transform: translateX(-50%) scale(1.12); }
  }

  /* grain overlay */
  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  /* ── Main card ── */
  .page {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 48px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .avatar-ring {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ff7b00, #ffaa00, #ff7b00);
    padding: 3px;
    animation: spin 6s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 46px;
    font-weight: 800;
    background: linear-gradient(135deg, #1a1f33, #0d1120);
    color: var(--amber);
    letter-spacing: -2px;
  }
  .online-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 18px; height: 18px;
    background: #22c55e;
    border-radius: 50%;
    border: 3px solid var(--dark);
    box-shadow: 0 0 8px rgba(34,197,94,0.6);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100%{opacity:1} 50%{opacity:0.4}
  }

  /* ── Name block ── */
  .name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    background: linear-gradient(135deg, #fff 30%, #ffaa00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .handle {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
    margin-bottom: 14px;
  }
  .handle i { color: var(--amber); font-size: 13px; }

  /* stats pills */
  .stats {
    display: flex; gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: #9099b5;
    display: flex; align-items: center; gap: 5px;
  }
  .stat i { color: var(--amber); font-size: 11px; }

  /* ── Links ── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 36px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  .link-card:nth-child(1){ animation-delay: 0.1s; }
  .link-card:nth-child(2){ animation-delay: 0.2s; }
  .link-card:nth-child(3){ animation-delay: 0.3s; }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255,123,0,0.12), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .link-card:hover::before { opacity: 1; }
  .link-card:hover {
    border-color: rgba(255,123,0,0.5);
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 16px 40px -8px rgba(255,100,0,0.25);
  }

  .icon-box {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .icon-box.wa { background: rgba(37,211,102,0.12); color: #25d366; }
  .icon-box.yt { background: rgba(255,0,0,0.12); color: #ff0000; }
  .icon-box.yt2{ background: rgba(255,80,0,0.12); color: #ff5000; }

  .link-label { flex: 1; }
  .link-sub {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 1px;
  }
  .chevron {
    color: var(--muted);
    font-size: 13px;
    transition: transform 0.25s, color 0.25s;
  }
  .link-card:hover .chevron {
    color: var(--amber);
    transform: translateX(3px);
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Footer / branding ── */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }
  .footer strong { color: rgba(255,255,255,0.5); }

  .biofeita-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 999px;
    padding: 7px 18px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    font-weight: 500;
  }
  .biofeita-badge:hover {
    border-color: rgba(255,170,0,0.4);
    color: var(--amber);
  }
  .biofeita-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
  }
  .biofeita-badge span { color: var(--amber); font-weight: 700; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
</style>
</head>
